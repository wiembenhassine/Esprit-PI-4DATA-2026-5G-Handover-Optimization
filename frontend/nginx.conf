server {
    listen 80;
    server_name _;

    # ── React SPA ──────────────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Client-side routing — all unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy → FastAPI gateway ────────────────────────────────────────────
    # Frontend calls /api/... → nginx strips /api prefix → forwards to gateway
    location /api/ {
        proxy_pass            http://api-gateway:8000/;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    120s;
        proxy_connect_timeout 15s;
        proxy_send_timeout    120s;

        # Pass request body correctly (needed for form POST login)
        proxy_pass_request_body    on;
        proxy_pass_request_headers on;

        # Buffer settings — prevents EOF on slow responses (model loading)
        proxy_buffering         on;
        proxy_buffer_size       16k;
        proxy_buffers           8 16k;
        proxy_busy_buffers_size 32k;

        # CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            add_header Content-Length 0;
            return 204;
        }
    }

    # ── Health check ───────────────────────────────────────────────────────────
    location /health.txt {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Gzip ───────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;
}
